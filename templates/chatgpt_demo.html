<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT Integration Demo</title>
    <style>
        :root {
            --primary-color: #10a37f; /* OpenAI Green */
            --secondary-color: #0d8a6a;
            --bg-color: #f7f7f8;
            --text-color: #343541;
            --ai-bubble: #ffffff;
            --user-bubble: #f1f1f1;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background-color: white;
            padding: 1rem 2rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.25rem;
            margin: 0;
        }

        .chat-container {
            flex: 1;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-box {
            flex: 1;
            padding: 2rem 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            max-width: 85%;
            padding: 1rem 1.25rem;
            border-radius: 10px;
            line-height: 1.5;
            font-size: 1rem;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-message {
            align-self: flex-start;
            background-color: var(--ai-bubble);
            border: 1px solid #e5e5e5;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-bubble);
        }

        .typing-indicator {
            display: none;
            padding: 1rem;
            font-style: italic;
            color: #8e8ea0;
            font-size: 0.9rem;
        }

        .input-area {
            background-color: white;
            border-top: 1px solid #e5e5e5;
            padding: 1.5rem 2rem;
        }

        .input-form {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 1rem;
            position: relative;
        }

        #chat-input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }

        #chat-input:focus {
            border-color: var(--primary-color);
        }

        #send-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background-color: var(--secondary-color);
        }

        .footer-note {
            text-align: center;
            font-size: 0.75rem;
            color: #8e8ea0;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>AI Chat Integration (Ollama + APIs)</h1>
        <a href="/">Back Home</a>
    </div>

    <div class="chat-container">
        <div class="chat-box" id="chat-box">
            <div class="message ai-message">
                Hello! This is a simple demo of linking Django with an AI model. Type anything below to test the connection.
            </div>
        </div>

        <div class="typing-indicator" id="typing-indicator">
            AI is thinking...
        </div>

        <div class="input-area">
            <form class="input-form" id="chat-form">
                {% csrf_token %}
                <input type="text" id="chat-input" placeholder="Ask me something..." autocomplete="off">
                <button type="submit" id="send-btn">Send</button>
            </form>
            <p class="footer-note">Educational Demo: Using Django, Requests, and External LLM APIs (OpenAI/Gemini) or Local Models via Ollama.</p>
        </div>
    </div>

    <script>
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatBox = document.getElementById('chat-box');
        const typingIndicator = document.getElementById('typing-indicator');

        function appendMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = chatInput.value.trim();
            if (!message) return;

            appendMessage(message, true);
            chatInput.value = '';

            typingIndicator.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch("{% url 'ai_chat' %}", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": document.querySelector('[name=csrfmiddlewaretoken]').value
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                typingIndicator.style.display = 'none';

                if (data.status === 'success') {
                    appendMessage(data.reply, false);
                } else {
                    appendMessage("Error: " + data.message, false);
                }
            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage("Connection failed: " + error, false);
            }
        });
    </script>
</body>
</html>
